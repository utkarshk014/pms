version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pms_postgres
    environment:
      POSTGRES_USER: pms_user
      POSTGRES_PASSWORD: pms_password
      POSTGRES_DB: pms_db
    ports:
      - "5432:5432"
    volumes:
      - pms_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pms_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@pms.local
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pms_postgres_data:
